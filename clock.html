<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chic Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-glass: rgba(255,255,255,0.06); --border-glass: rgba(255,255,255,0.12); --accent: #e0aaff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; color: #fff; }
        #canvas-container, #custom-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #canvas-container { z-index: 1; pointer-events: none; transition: opacity 0.5s ease; }
        #custom-bg { object-fit: cover; z-index: 0; display: none; background-size: cover; background-position: center; transition: opacity 0.5s ease; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: grid; grid-template-columns: 280px 1fr 300px; padding: 20px; gap: 20px; pointer-events: none; }
        @media (max-width: 900px) { .ui-layer { grid-template-columns: 1fr; overflow-y: auto; pointer-events: auto; } }
        .glass-panel { background: var(--bg-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border-glass); border-radius: 20px; padding: 20px; pointer-events: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.3); margin-bottom: 15px; }
        h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; color: var(--accent); }
        .btn { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid var(--border-glass); padding: 10px; border-radius: 10px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.8rem; transition: 0.3s; margin-bottom: 8px; }
        .btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-1px); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .center-col { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #time { font-size: 5.5rem; font-weight: 200; letter-spacing: -2px; text-shadow: 0 4px 12px rgba(0,0,0,0.5); }
        #date { font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.6); }
        #region { font-size: 0.8rem; color: var(--accent); margin-top: 5px; }
        .flex-in { display: flex; gap: 6px; margin-bottom: 12px; }
        .flex-in input { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass); padding: 8px; border-radius: 8px; color: white; outline: none; font-size: 0.85rem; }
        .rem-list { max-height: 140px; overflow-y: auto; font-size: 0.8rem; }
        .rem-item { background: rgba(255,255,255,0.04); padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        #notif-center { position: absolute; top: 15px; right: 15px; z-index: 100; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { width: 280px; background: rgba(255,255,255,0.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 14px; padding: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; gap: 10px; color: #000; animation: sIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; pointer-events: auto; }
        @keyframes sIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .t-ico { width: 32px; height: 32px; background: #1d9bf0; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.9rem; }
        .t-head { display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 600; color: rgba(0,0,0,0.4); }
        .t-title { font-weight: 700; font-size: 0.8rem; }
        .t-body { font-size: 0.8rem; color: #333; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="custom-bg"></div>
    <div id="notif-center"></div>

    <div class="ui-layer">
        <div class="left-col">
            <div class="glass-panel">
                <h3><i class="fa-solid fa-music"></i> Audio Engine</h3>
                <button class="btn" onclick="document.getElementById('f-in').click()"><i class="fa-solid fa-upload"></i> Local File</button>
                <input type="file" id="f-in" accept="audio/*" style="display:none;">
                <audio id="player" controls style="width:100%; display:none; margin-top:8px;"></audio>
                <div class="grid-2" style="margin-top:10px;">
                    <button class="btn" onclick="msg('Spotify','Link API endpoints in script')"><i class="fa-brands fa-spotify"></i> Spotify</button>
                    <button class="btn" onclick="msg('Apple','Link API endpoints in script')"><i class="fa-brands fa-apple"></i> Apple</button>
                </div>
            </div>
            <div class="glass-panel">
                <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Visuals</h3>
                <button class="btn" onclick="resetBg()"><i class="fa-solid fa-cube"></i> Default 3D</button>
                <button class="btn" onclick="document.getElementById('bg-in').click()"><i class="fa-solid fa-image"></i> Media Wallpaper</button>
                <input type="file" id="bg-in" accept="image/*,video/*" style="display:none;">
            </div>
        </div>

        <div class="center-col">
            <div id="time">00:00:00</div>
            <div id="date">Loading...</div>
            <div id="region">Detecting...</div>
        </div>

        <div class="right-col">
            <div class="glass-panel">
                <h3><i class="fa-solid fa-bell"></i> Reminders</h3>
                <div class="flex-in">
                    <input type="text" id="rem-txt" placeholder="New reminder...">
                    <button class="btn" style="width:auto; margin:0;" onclick="addRem()"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="rem-list" id="rem-box"></div>
            </div>
            <div class="glass-panel">
                <h3><i class="fa-solid fa-calendar"></i> Calendar</h3>
                <button class="btn" onclick="msg('Google Calendar','OAuth requested')"><i class="fa-brands fa-google"></i> Sync Google</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let ctx, analyser, data, active = false, shouldRender = true;

        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toTimeString().split(' ')[0];
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        try {
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone.split('/')[1] || "Local";
            document.getElementById('region').innerText = `Zone: ${tz.replace('_', ' ')}`;
        } catch(e) {}
        setInterval(updateClock, 1000); updateClock();

        function msg(title, text) {
            const box = document.getElementById('notif-center');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<div class="t-ico"><i class="fa-solid fa-comment"></i></div><div><div class="t-head"><span>ALERT</span><span>${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div><div class="t-title">${title}</div><div class="t-body">${text}</div></div>`;
            box.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                setTimeout(() => t.remove(), 400);
            }, 5000);
        }

        let rems = [{id:1, txt:"Hydrate beautifully"}];
        function drawRems() {
            const b = document.getElementById('rem-box'); b.innerHTML = '';
            rems.forEach(r => {
                const d = document.createElement('div'); d.className = 'rem-item';
                d.innerHTML = `<span>${r.txt}</span><i class="fa-solid fa-circle-check" style="color:var(--accent);cursor:pointer;" onclick="delRem(${r.id})"></i>`;
                b.appendChild(d);
            });
        }
        function addRem() {
            const i = document.getElementById('rem-txt'); if(!i.value.trim()) return;
            rems.push({id:Date.now(), txt:i.value.trim()}); msg("Reminders", "Added successfully"); i.value = ''; drawRems();
        }
        function delRem(id) { rems = rems.filter(r => r.id !== id); msg("Reminders", "Completed"); drawRems(); }
        drawRems();

        let scene, camera, renderer, system;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000); camera.position.z = 40;
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            const geo = new THREE.BufferGeometry(), pos = new Float32Array(1500);
            for(let i=0; i<1500; i++) pos[i] = (Math.random() - 0.5) * 80;
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            
            system = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xe0aaff, size: 0.35, transparent: true, opacity: 0.8 }));
            scene.add(system);
            
            window.addEventListener('resize', () => { 
                camera.aspect = window.innerWidth/window.innerHeight; 
                camera.updateProjectionMatrix(); 
                renderer.setSize(window.innerWidth, window.innerHeight); 
            });
            loop();
        }
        
        function loop() {
            requestAnimationFrame(loop);
            if (!system || !shouldRender) return; 
            
            system.rotation.x += 0.001; 
            system.rotation.y += 0.0015;
            
            if(active && analyser) {
                analyser.getByteFrequencyData(data);
                let sum = 0; for(let i=0; i<data.length; i++) sum += data[i];
                let val = 1 + ((sum/data.length) * 0.015);
                system.scale.set(val, val, val);
            }
            renderer.render(scene, camera);
        }

        const fIn = document.getElementById('f-in'), p = document.getElementById('player');
        fIn.addEventListener('change', async (e) => {
            if(!e.target.files[0]) return;
            p.src = URL.createObjectURL(e.target.files[0]); p.style.display = 'block'; p.play();
            
            if (!ctx) {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = ctx.createAnalyser(); 
                ctx.createMediaElementSource(p).connect(analyser); 
                analyser.connect(ctx.destination);
                analyser.fftSize = 64; 
                data = new Uint8Array(analyser.frequencyBinCount);
            }
            if (ctx.state === 'suspended') { await ctx.resume(); }
            active = true;
            msg("Audio Engine", "3D System sync active");
        });

        const bgIn = document.getElementById('bg-in'), cBg = document.getElementById('custom-bg'), cCon = document.getElementById('canvas-container');
        bgIn.addEventListener('change', (e) => {
            const f = e.target.files[0]; if(!f) return;
            const url = URL.createObjectURL(f); 
            
            if(f.type.startsWith('video')) { 
                const video = document.createElement('video');
                video.src = url; video.autoplay = true; video.loop = true; video.muted = true; video.playsInline = true;
                video.style.width = '100%'; video.style.height = '100%'; video.style.objectFit = 'cover';
                
                video.onimagesready = video.onloadeddata = () => {
                    cBg.innerHTML = '';
                    cBg.appendChild(video);
                    cBg.style.backgroundImage = 'none';
                    cBg.style.display = 'block';
                    cCon.style.opacity = '0.1';
                    shouldRender = false; // Freeze 3D Engine to preserve phone resources
                };
            } else { 
                cBg.innerHTML = '';
                cBg.style.backgroundImage = `url(${url})`; 
                cBg.style.display = 'block';
                cCon.style.opacity = '0.2'; 
                shouldRender = false;
            }
            msg("Visuals", "Wallpaper updated");
        });
        
        function resetBg() { 
            cBg.style.display = 'none'; 
            cBg.innerHTML = ''; 
            cBg.style.backgroundImage = 'none'; 
            cCon.style.opacity = '1'; 
            shouldRender = true; 
        }
        
        init3D();
    </script>
</body>
</html>
