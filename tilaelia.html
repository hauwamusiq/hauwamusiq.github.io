<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Creative Archive — Immersive Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #f3f3f6;
        }

        /* Hardware Accelerated WebGL Surface Target */
        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transform: translateZ(0);
        }

        /* Secure Gatekeeper Overlay Layer */
        #gatekeeper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a24 0%, #0b0b0e 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), visibility 1.2s;
            will-change: opacity;
        }

        #gatekeeper.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .gatekeeper-content {
            text-align: center;
            max-width: 600px;
            padding: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 20px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #f3f3f6, #a2a2b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1rem;
            color: #8a8a9e;
            letter-spacing: 0.1em;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .enter-btn {
            background: transparent;
            border: 1px solid rgba(243, 243, 243, 0.3);
            padding: 16px 45px;
            color: #f3f3f6;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            outline: none;
        }

        .enter-btn:hover {
            border-color: #f3f3f6;
            box-shadow: 0 0 25px rgba(253, 253, 253, 0.15);
            transform: translateY(-2px);
        }

        /* Immersive Context UI Layer */
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        #ui-layer.visible {
            opacity: 1;
        }

        header h2 {
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(243, 243, 243, 0.8);
        }

        /* Elastic Side Content Display Panel */
        #panel-container {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 380px;
            background: rgba(11, 11, 14, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            display: none;
            max-height: 85vh;
            overflow-y: auto;
            pointer-events: auto;
        }

        #panel-container.active {
            display: block;
            animation: fadeInRight 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .close-panel {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            border: none;
            color: #8a8a9e;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-panel:hover { color: #f3f3f6; }

        .panel-title {
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 15px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #ffffff;
        }

        .sub-navigation {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sub-nav-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 14px 18px;
            text-align: left;
            color: #a2a2b0;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .sub-nav-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            color: #ffffff;
            padding-left: 24px;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .hud-instructions {
            font-size: 0.75rem;
            color: #555566;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translate(40px, -50%); }
            to { opacity: 1; transform: translate(0, -50%); }
        }

        @media(max-width: 768px) {
            #ui-layer { padding: 20px; }
            #panel-container {
                right: 20px;
                left: 20px;
                width: calc(100% - 40px);
                top: auto;
                bottom: 20px;
                transform: none;
                max-height: 50vh;
            }
            @keyframes fadeInRight {
                from { opacity: 0; transform: translateY(40px); }
                to { opacity: 1; transform: translateY(0); }
            }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="gatekeeper">
        <div class="gatekeeper-content">
            <h1>The Creative Archive</h1>
            <p>An immersive multi-disciplinary space showcasing fine arts, musical compositions, and written literature.</p>
            <button id="enter-experience-btn" class="enter-btn">Enter Experience</button>
        </div>
    </div>

    <div id="ui-layer">
        <header>
            <h2>Portfolio Gallery</h2>
        </header>

        <div id="panel-container">
            <button class="close-panel" onclick="closePanel()">×</button>
            <div id="panel-content"></div>
        </div>

        <footer>
            <div class="hud-instructions">● Select an exhibit core to view collection channels</div>
        </footer>
    </div>

    <div id="webgl-container"></div>

    <script>
        let scene, camera, renderer, nodes = [];
        let raycaster, mouse;
        let isEntered = false;
        let targetCameraZ = 7.5;
        let currentIntersected = null;

        const galleryData = {
            atelier: {
                title: "The Atelier",
                desc: "A sanctuary dedicated to visual weight, texture, and thought captured on canvas.",
                subcategories: ["Paintings", "Drawings", "Sketches"]
            },
            music: {
                title: "Sonic Spaces",
                desc: "Auditory environments, compositions, and soundscapes designed to evoke raw emotion.",
                subcategories: ["Compositions", "Sound Design", "Live Sessions"]
            },
            writings: {
                title: "The Scriptorium",
                desc: "Curated collections of linguistic records spanning creative prose and concrete research.",
                subcategories: ["Poetry", "Essays", "Academic Research", "Literature"]
            }
        };

        const nodeConfigs = [
            { key: 'atelier', color: 0xd4af37, x: -3.3, y: 0, z: 0, size: 1.1 }, 
            { key: 'music', color: 0x4a90e2, x: 0, y: 0.8, z: -0.5, size: 0.95 },   
            { key: 'writings', color: 0xe06d53, x: 3.3, y: -0.4, z: 0, size: 1.05 } 
        ];

        function init() {
            const container = document.getElementById('webgl-container');
            if(!container) return;

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0b0b0e, 0.06);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 18); 

            // Patched Engine Context Call with High Performance Allocations
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: false,
                powerPreference: "high-performance" 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.1);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            createParticleField();
            createGalleryNodes();

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('click', onSceneClick, false);

            const enterBtn = document.getElementById('enter-experience-btn');
            if(enterBtn) {
                enterBtn.addEventListener('click', enterGallery, false);
            }

            animate();
        }

        function createParticleField() {
            const particleCount = 350;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 22;
                positions[i + 1] = (Math.random() - 0.5) * 22;
                positions[i + 2] = (Math.random() - 0.5) * 22;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.035,
                color: 0x8a8a9e,
                transparent: true,
                opacity: 0.45,
                blending: THREE.AdditiveBlending
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function createGalleryNodes() {
            nodeConfigs.forEach(cfg => {
                const group = new THREE.Group();
                group.position.set(cfg.x, cfg.y, cfg.z);
                group.userData = { key: cfg.key, currentScale: 1.0, driftOffset: Math.random() * 100 };

                // Outer Structural Mesh Wireframe
                const geom = new THREE.IcosahedronGeometry(cfg.size, 1);
                const mat = new THREE.MeshStandardMaterial({
                    color: cfg.color,
                    wireframe: true,
                    roughness: 0.3,
                    metalness: 0.7,
                });
                const mesh = new THREE.Mesh(geom, mat);
                group.add(mesh);

                // Internal Solid Core Emission Target
                const innerGeom = new THREE.IcosahedronGeometry(cfg.size * 0.38, 0);
                const innerMat = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    emissive: cfg.color,
                    roughness: 0.4,
                    flatShading: true
                });
                const innerMesh = new THREE.Mesh(innerGeom, innerMat);
                group.add(innerMesh);

                // FIXED: Invisible Bounding Sphere Box for Flawless Interaction Hit Calculations
                const hitGeom = new THREE.SphereGeometry(cfg.size * 1.1, 8, 8);
                const hitMat = new THREE.MeshBasicMaterial({ visible: false });
                const hitMesh = new THREE.Mesh(hitGeom, hitMat);
                hitMesh.userData = { isHitTarget: true };
                group.add(hitMesh);

                scene.add(group);
                nodes.push(group);
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.0006;
            
            nodes.forEach((node) => {
                const offset = node.userData.driftOffset;
                node.children[0].rotation.y = time * 0.4 + offset * 0.01;
                node.children[0].rotation.x = time * 0.15;
                node.children[1].rotation.y = -time * 0.6;
                
                // Pure-math fluid floating matrix calculation
                node.position.y += Math.sin(time + offset) * 0.0025;

                // Native interpolation update sequence 
                let tScale = node.userData.currentScale;
                node.scale.x += (tScale - node.scale.x) * 0.12;
                node.scale.y += (tScale - node.scale.y) * 0.12;
                node.scale.z += (tScale - node.scale.z) * 0.12;
            });

            if(isEntered) {
                // High precision camera translation vectors
                camera.position.z += (targetCameraZ - camera.position.z) * 0.035;
                camera.position.x += (mouse.x * 1.6 - camera.position.x) * 0.04;
                camera.position.y += (mouse.y * 1.2 - camera.position.y) * 0.04;
                camera.lookAt(0, 0, 0);
            }

            renderer.render(scene, camera);
        }

        function enterGallery() {
            isEntered = true;
            document.getElementById('gatekeeper').classList.add('hidden');
            
            const uiLayer = document.getElementById('ui-layer');
            if(uiLayer) uiLayer.classList.add('visible');
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if(!isEntered) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            let hoveredKey = null;

            if(intersects.length > 0) {
                // Trace back upward cleanly to find parent object parameters
                let hitObj = intersects.find(o => o.object.parent);
                if(hitObj) {
                    let parentGroup = hitObj.object.parent;
                    parentGroup.userData.currentScale = 1.18;
                    hoveredKey = parentGroup.userData.key;
                    document.body.style.cursor = 'pointer';
                }
            }

            // Reset non-hovered visual scales seamlessly
            nodes.forEach(node => {
                if(node.userData.key !== hoveredKey) {
                    node.userData.currentScale = 1.0;
                }
            });

            if(!hoveredKey) {
                document.body.style.cursor = 'default';
            }
        }

        function onSceneClick() {
            if(!isEntered) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if(intersects.length > 0) {
                let hitObj = intersects.find(o => o.object.parent);
                if(hitObj) {
                    let clickedNode = hitObj.object.parent;
                    if(clickedNode && clickedNode.userData.key) {
                        openCategoryPanel(clickedNode.userData.key);
                    }
                }
            }
        }

        function openCategoryPanel(key) {
            const data = galleryData[key];
            const panel = document.getElementById('panel-container');
            const content = document.getElementById('panel-content');
            if(!panel || !content || !data) return;

            let subNavHTML = data.subcategories.map(sub => `
                <button class="sub-nav-btn" onclick="console.log('Routing down to visual subchannel: ${sub}')">
                    ${sub} &rarr;
                </button>
            `).join('');

            content.innerHTML = `
                <h3 class="panel-title">${data.title}</h3>
                <p style="margin-bottom:20px; font-size:0.92rem; color:#8a8a9e; line-height:1.5;">${data.desc}</p>
                <div class="sub-navigation">
                    ${subNavHTML}
                </div>
            `;

            panel.classList.add('active');
        }

        function closePanel() {
            const panel = document.getElementById('panel-container');
            if(panel) panel.classList.remove('active');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Failsafe Execution Architecture Bootloader
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
