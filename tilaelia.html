<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Creative Archive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #f3f3f6;
            perspective: 1000px;
        }

        /* Gatekeeper Overlay */
        #gatekeeper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a24 0%, #0b0b0e 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, visibility 1s;
        }

        #gatekeeper.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .gatekeeper-content {
            text-align: center;
            max-width: 600px;
            padding: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 20px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #f3f3f6, #a2a2b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1rem;
            color: #8a8a9e;
            letter-spacing: 0.1em;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .enter-btn {
            background: transparent;
            border: 1px solid rgba(243, 243, 243, 0.3);
            padding: 16px 45px;
            color: #f3f3f6;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.4s ease;
        }

        .enter-btn:hover {
            border-color: #f3f3f6;
            box-shadow: 0 0 25px rgba(253, 253, 253, 0.15);
            transform: translateY(-2px);
        }

        /* Pure CSS Immersive Gallery Stage */
        #gallery-stage {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            opacity: 0;
            transform: scale(0.8) translateZ(-200px);
            transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }

        #gallery-stage.visible {
            opacity: 1;
            transform: scale(1) translateZ(0);
        }

        /* Playful Floating 3D Node Pods */
        .art-node {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
            animation: floatSlow 6s ease-in-out infinite alternate;
        }

        .art-node:nth-child(2) { animation-delay: -2s; }
        .art-node:nth-child(3) { animation-delay: -4s; }

        .art-node:hover {
            border-color: #ffffff;
            transform: scale(1.1) rotateY(10deg);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .node-core {
            width: 70px;
            height: 70px;
            border-radius: 35%;
            margin-bottom: 15px;
            transform: translateZ(20px);
            transition: transform 0.5s;
        }

        #node-atelier .node-core { background: #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        #node-music .node-core { background: #4a90e2; box-shadow: 0 0 20px rgba(74, 144, 226, 0.4); }
        #node-writings .node-core { background: #e06d53; box-shadow: 0 0 20px rgba(224, 109, 83, 0.4); }

        .node-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 400;
        }

        /* Side Info Display Panel */
        #panel-container {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%) translateX(100px);
            width: 380px;
            background: rgba(11, 11, 14, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
        }

        #panel-container.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(-50%) translateX(0);
        }

        .close-panel {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent;
            border: none;
            color: #8a8a9e;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .panel-title {
            font-size: 1.6rem;
            margin-bottom: 15px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .sub-navigation {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sub-nav-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 14px 18px;
            text-align: left;
            color: #a2a2b0;
            font-size: 0.9rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sub-nav-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            color: #ffffff;
            padding-left: 24px;
        }

        @keyframes floatSlow {
            from { transform: translateY(-10px) rotateX(0deg); }
            to { transform: translateY(10px) rotateX(5deg); }
        }

        @media(max-width: 768px) {
            #gallery-stage { flex-direction: column; gap: 20px; padding-top: 60px; }
            #panel-container { bottom: 20px; top: auto; transform: translateY(100px); right: 20px; left: 20px; width: calc(100% - 40px); }
            #panel-container.active { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gatekeeper-content">
            <h1>The Creative Archive</h1>
            <p>An immersive multi-disciplinary space showcasing fine arts, musical compositions, and written literature.</p>
            <button class="enter-btn" onclick="enterGallery()">Enter Experience</button>
        </div>
    </div>

    <div id="gallery-stage">
        <div class="art-node" id="node-atelier" onclick="openPanel('atelier')">
            <div class="node-core"></div>
            <div class="node-title">Atelier</div>
        </div>
        <div class="art-node" id="node-music" onclick="openPanel('music')">
            <div class="node-core"></div>
            <div class="node-title">Music</div>
        </div>
        <div class="art-node" id="node-writings" onclick="openPanel('writings')">
            <div class="node-core"></div>
            <div class="node-title">Writings</div>
        </div>
    </div>

    <div id="panel-container">
        <button class="close-panel" onclick="closePanel()">×</button>
        <div id="panel-content"></div>
    </div>

    <script>
        const galleryData = {
            atelier: {
                title: "The Atelier",
                desc: "A sanctuary dedicated to visual weight, texture, and thought captured on canvas.",
                subcategories: ["Paintings", "Drawings", "Sketches"]
            },
            music: {
                title: "Sonic Spaces",
                desc: "Auditory environments, compositions, and soundscapes designed to evoke raw emotion.",
                subcategories: ["Compositions", "Sound Design", "Live Sessions"]
            },
            writings: {
                title: "The Scriptorium",
                desc: "Curated collections of linguistic records spanning creative prose and concrete research.",
                subcategories: ["Poetry", "Essays", "Academic Research", "Literature"]
            }
        };

        function enterGallery() {
            document.getElementById('gatekeeper').classList.add('hidden');
            document.getElementById('gallery-stage').classList.add('visible');
        }

        function openPanel(key) {
            const data = galleryData[key];
            const content = document.getElementById('panel-content');
            
            let subNavHTML = data.subcategories.map(sub => `
                <button class="sub-nav-btn" onclick="alert('Opening collection channel: ${sub}')">
                    ${sub} &rarr;
                </button>
            `).join('');

            content.innerHTML = `
                <h3 class="panel-title">${data.title}</h3>
                <p style="margin-bottom:20px; font-size:0.92rem; color:#8a8a9e; line-height:1.5;">${data.desc}</p>
                <div class="sub-navigation">${subNavHTML}</div>
            `;

            document.getElementById('panel-container').classList.add('active');
        }

        function closePanel() {
            document.getElementById('panel-container').classList.remove('active');
        }
    </script>
</body>
</html>
