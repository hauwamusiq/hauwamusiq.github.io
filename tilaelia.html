<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Portfolio Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #f3f3f6;
        }

        /* WebGL Canvas */
        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Gatekeeper Screen */
        #gatekeeper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a24 0%, #0b0b0e 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1), visibility 1.5s;
        }

        #gatekeeper.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .gatekeeper-content {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 20px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #f3f3f6, #a2a2b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1rem;
            color: #8a8a9e;
            letter-spacing: 0.1em;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .enter-btn {
            background: transparent;
            border: 1px solid rgba(243, 243, 243, 0.3);
            padding: 15px 40px;
            color: #f3f3f6;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .enter-btn:hover {
            border-color: #f3f3f6;
            box-shadow: 0 0 20px rgba(253, 253, 253, 0.15);
            transform: translateY(-2px);
        }

        /* Immersive UI Overlay */
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Let clicks pass through to 3D scene */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            opacity: 0;
            transition: opacity 2s ease 1s;
        }

        #ui-layer.visible {
            pointer-events: auto;
            opacity: 1;
        }

        header h2 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* Dynamic Content Panel */
        #panel-container {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 380px;
            background: rgba(11, 11, 14, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: none;
            max-height: 80vh;
            overflow-y: auto;
        }

        #panel-container.active {
            display: block;
            animation: fadeInRight 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .close-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: #8a8a9e;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .close-panel:hover { color: #f3f3f6; }

        .panel-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #ffffff;
        }

        .sub-navigation {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sub-nav-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            text-align: left;
            color: #a2a2b0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sub-nav-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            padding-left: 18px;
        }

        /* Instructions HUD */
        .hud-instructions {
            font-size: 0.8rem;
            color: #646475;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translate(30px, -50%); }
            to { opacity: 1; transform: translate(0, -50%); }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div id="gatekeeper">
        <div class="gatekeeper-content">
            <h1>The Creative Archive</h1>
            <p>An immersive multi-disciplinary space showcasing fine arts, musical compositions, and written literature.</p>
            <button class="enter-btn" onclick="enterGallery()">Enter Experience</button>
        </div>
    </div>

    <div id="ui-layer">
        <header>
            <h2>Portfolio Gallery</h2>
        </header>

        <div id="panel-container">
            <button class="close-panel" onclick="closePanel()">×</button>
            <div id="panel-content">
                </div>
        </div>

        <footer>
            <div class="hud-instructions">● Click an exhibit to explore details</div>
        </footer>
    </div>

    <div id="webgl-container"></div>

    <script>
        /* --- Diagnostic & Configuration Framework --- */
        let scene, camera, renderer, nodes = [];
        let raycaster, mouse;
        let isEntered = false;

        // Data Structure for all items (Tested for structure integrity)
        const galleryData = {
            atelier: {
                title: "The Atelier",
                desc: "A sanctuary dedicated to visual weight, texture, and thought captured on canvas.",
                subcategories: ["Paintings", "Drawings", "Sketches"]
            },
            music: {
                title: "Sonic Spaces",
                desc: "Auditory environments, compositions, and soundscapes designed to evoke raw emotion.",
                subcategories: ["Compositions", "Sound Design", "Live Sessions"]
            },
            writings: {
                title: "The Scriptorium",
                desc: "Curated collections of linguistic records spanning creative prose and concrete research.",
                subcategories: ["Poetry", "Essays", "Academic Research", "Literature"]
            }
        };

        // Node Visual Configurations
        const nodeConfigs = [
            { key: 'atelier', color: 0xd4af37, x: -3.5, y: 0, z: 0, size: 1.2 }, // Gold
            { key: 'music', color: 0x4a90e2, x: 0, y: 1, z: -1, size: 1.0 },   // Blue
            { key: 'writings', color: 0xe06d53, x: 3.5, y: -0.5, z: 0, size: 1.1 } // Coral
        ];

        function init() {
            const container = document.getElementById('webgl-container');

            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0b0b0e, 0.05);

            // Camera setup
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 8);

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            // Lighting Engine
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0xffffff, 0.5, 15);
            pointLight.position.set(0, -2, 3);
            scene.add(pointLight);

            // Generate Atmospheric Particle Dust Field
            createParticleField();

            // Generate Interactive Gallery Nodes
            createGalleryNodes();

            // Interaction Utilities
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Global Event Listeners
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onSceneClick);

            // Initialization loop call
            animate();
        }

        function createParticleField() {
            const particleCount = 400;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 20;
                positions[i + 1] = (Math.random() - 0.5) * 20;
                positions[i + 2] = (Math.random() - 0.5) * 20;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            // Soft glowing particle points
            const material = new THREE.PointsMaterial({
                size: 0.04,
                color: 0x8a8a9e,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function createGalleryNodes() {
            nodeConfigs.forEach(cfg => {
                // Interactive complex geometry grouping
                const group = new THREE.Group();
                group.position.set(cfg.x, cfg.y, cfg.z);
                group.userData = { key: cfg.key };

                // Core Sphere Mesh
                const geom = new THREE.IcosahedronGeometry(cfg.size, 1);
                const mat = new THREE.MeshStandardMaterial({
                    color: cfg.color,
                    wireframe: true,
                    roughness: 0.2,
                    metalness: 0.8,
                });
                const mesh = new THREE.Mesh(geom, mat);
                group.add(mesh);

                // Inner Solid core wireframe partner for abstract aesthetic depth
                const innerGeom = new THREE.IcosahedronGeometry(cfg.size * 0.4, 0);
                const innerMat = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    emissive: cfg.color,
                    roughness: 0.5,
                    flatShading: true
                });
                const innerMesh = new THREE.Mesh(innerGeom, innerMat);
                group.add(innerMesh);

                scene.add(group);
                nodes.push(group);
            });
        }

        /* --- Animation & Mechanics Loop --- */
        function animate() {
            requestAnimationFrame(animate);

            // Idle Rotations across components
            const time = Date.now() * 0.0005;
            
            nodes.forEach((node, idx) => {
                node.children[0].rotation.y = time * (0.3 + (idx * 0.1));
                node.children[0].rotation.x = time * 0.1;
                node.children[1].rotation.y = -time * 0.5;
                
                // Playful floating movement physics
                node.position.y += Math.sin(time + idx * 2) * 0.002;
            });

            // Smooth parallax interaction effect if user bypassed gatekeeper
            if(isEntered) {
                camera.position.x += (mouse.x * 1.5 - camera.position.x) * 0.05;
                camera.position.y += (mouse.y * 1.5 - camera.position.y) * 0.05;
                camera.lookAt(0, 0, 0);
            }

            renderer.render(scene, camera);
        }

        /* --- Interface Interaction Functions --- */
        function enterGallery() {
            isEntered = true;
            document.getElementById('gatekeeper').classList.add('hidden');
            document.getElementById('ui-layer').classList.add('visible');

            // Kinetic entrance zoom camera sequence
            gsap.from(camera.position, {
                z: 15,
                duration: 2.5,
                ease: "power3.out"
            });
        }

        function onMouseMove(event) {
            // Calculate screen space coordinates mapped to canvas bounds
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // Hover interactions feedback mechanics
            if(!isEntered) return;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if(intersects.length > 0) {
                document.body.style.cursor = 'pointer';
                // Soft pulsing scale target feedback
                let hitNode = intersects[0].object.parent;
                if(hitNode && hitNode.userData.key) {
                    gsap.to(hitNode.scale, {x: 1.15, y: 1.15, z: 1.15, duration: 0.3});
                }
            } else {
                document.body.style.cursor = 'default';
                nodes.forEach(node => {
                    gsap.to(node.scale, {x: 1, y: 1, z: 1, duration: 0.3});
                });
            }
        }

        function onSceneClick() {
            if(!isEntered) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if(intersects.length > 0) {
                let clickedNode = intersects[0].object.parent;
                if(clickedNode && clickedNode.userData.key) {
                    openCategoryPanel(clickedNode.userData.key);
                }
            }
        }

        function openCategoryPanel(key) {
            const data = galleryData[key];
            const panel = document.getElementById('panel-container');
            const content = document.getElementById('panel-content');

            // Construct fully interactive custom HTML architecture for writing subsets
            let subNavHTML = data.subcategories.map(sub => `
                <button class="sub-nav-btn" onclick="alert('Navigating deeper to: ${sub}')">
                    ${sub} &rarr;
                </button>
            `).join('');

            content.innerHTML = `
                <h3 class="panel-title">${data.title}</h3>
                <p style="margin-bottom:20px; font-size:0.95rem;">${data.desc}</p>
                <div class="sub-navigation">
                    ${subNavHTML}
                </div>
            `;

            panel.classList.add('active');
        }

        function closePanel() {
            document.getElementById('panel-container').classList.remove('active');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Initialize execution setup automatically on load
        window.onload = init;
    </script>
</body>
</html>
