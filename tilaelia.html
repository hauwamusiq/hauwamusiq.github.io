<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tilaelia's portfolio</title>
    <style>
        /* Base Reset & Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace; /* Fits the "if you dare" vibe */
            background-color: #0b0b0b;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- 1. INTRO SPLASH PAGE --- */
        #intro-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.8s ease, visibility 0.8s;
            text-align: center;
            padding: 20px;
        }

        #intro-page h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-transform: lowercase; /* matches "tilaelia's portfolio" */
        }

        #intro-page p {
            font-size: 1.5rem;
            color: #888;
            margin-bottom: 40px;
        }

        .enter-btn {
            background: none;
            border: 2px solid #ffffff;
            color: #ffffff;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        /* Hover effect requested */
        .enter-btn:hover {
            background-color: #ffffff;
            color: #050505;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        /* When clicked, we fade it out */
        #intro-page.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* --- 2. MAIN WEBSITE CONTENT --- */
        #main-site {
            opacity: 0;
            transition: opacity 1s ease 0.5s;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #main-site.visible {
            opacity: 1;
        }

        /* Header / Logo */
        .site-header {
            text-align: center;
            margin-bottom: 60px;
        }
        .site-header h2 {
            font-size: 2rem;
            letter-spacing: 2px;
        }

        /* Category Menu / Navigation Cards */
        .portfolio-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .menu-card {
            background: #141414;
            border: 1px solid #222;
            padding: 40px 20px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            border-color: #555;
        }

        .menu-card h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .menu-card p {
            color: #aaa;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="intro-page">
        <h1>tilaelia's portfolio</h1>
        <p>enter if you dare &gt;:)</p>
        <button class="enter-btn" onclick="enterWebsite()">click here</button>
    </div>

    <div id="main-site">
        <header class="site-header">
            <h2>tilaelia</h2>
        </header>

        <main>
            <div class="portfolio-menu">
                
                <div class="menu-card" onclick="alert('Vinyl Music Player section goes here!')">
                    <h3>music</h3>
                    <p>Step inside the crate. Listen to custom tracks and custom vinyl animations.</p>
                </div>

                <div class="menu-card" onclick="alert('Paintings gallery section goes here!')">
                    <h3>paintings</h3>
                    <p>A visual gallery of canvas works, sketches, and fine art collections.</p>
                </div>

                <div class="menu-card" onclick="alert('Other projects go here!')">
                    <h3>etc.</h3>
                    <p>Miscellaneous digital creations, design experiments, and logs.</p>
                </div>

            </div>
        </main>
    </div>

    <script>
        // Function to smoothly transition from intro page to home page
        function enterWebsite() {
            const intro = document.getElementById('intro-page');
            const main = document.getElementById('main-site');

            intro.classList.add('hidden'); // Fade out the intro
            main.classList.add('visible');  // Fade in the main home page
        }

        // NOTE: Your vinyl state management logic from earlier can live down here,
        // and we can link the "music" card directly to open it up!
    </script>
</body>
</html>
