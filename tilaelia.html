<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tilaelia's portfolio</title>
    <style>
        /* Base Reset & Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0b0b0b;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent; /* Smooth mobile tapping */
        }

        /* --- 1. INTRO SPLASH PAGE --- */
        #intro-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #050505;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.8s ease, visibility 0.8s;
            text-align: center;
            padding: 20px;
        }

        #intro-page h1 {
            font-size: calc(1.8rem + 1.5vw); /* Responsive text scaling */
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-transform: lowercase;
        }

        #intro-page p {
            font-size: calc(1rem + 0.5vw);
            color: #888;
            margin-bottom: 40px;
        }

        .enter-btn {
            background: none;
            border: 2px solid #ffffff;
            color: #ffffff;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            outline: none;
        }

        /* Hover effect */
        .enter-btn:hover {
            background-color: #ffffff;
            color: #050505;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        /* Active click effect for mobile screens */
        .enter-btn:active {
            transform: scale(0.98);
        }

        #intro-page.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* --- 2. MAIN WEBSITE CONTENT --- */
        #main-site {
            opacity: 0;
            transition: opacity 1s ease 0.5s;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #main-site.visible {
            opacity: 1;
        }

        .site-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .site-header h2 {
            font-size: 2rem;
            letter-spacing: 2px;
        }

        /* Responsive Category Grid */
        .portfolio-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .menu-card {
            background: #141414;
            border: 1px solid #222;
            padding: 40px 20px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.3s ease, background-color 0.2s;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            border-color: #555;
        }

        .menu-card:active {
            background-color: #1a1a1a;
        }

        .menu-card h3 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .menu-card p {
            color: #aaa;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* Mobile specific spacing tweaks */
        @media (max-width: 600px) {
            #main-site {
                padding: 20px 15px;
            }
            .site-header {
                margin-bottom: 30px;
            }
            .menu-card {
                padding: 30px 15px;
            }
        }
    </style>
</head>
<body>

    <div id="intro-page">
        <h1>tilaelia's portfolio</h1>
        <p>enter if you dare &gt;:)</p>
        <button class="enter-btn" onclick="enterWebsite()">click here</button>
    </div>

    <div id="main-site">
        <header class="site-header">
            <h2>tilaelia</h2>
        </header>

        <main>
            <div class="portfolio-menu">
                
                <div class="menu-card" onclick="alert('Music section coming soon!')">
                    <h3>music</h3>
                    <p>Step inside the crate. Listen to custom tracks and watch custom vinyl animations.</p>
                </div>

                <div class="menu-card" onclick="alert('Paintings gallery coming soon!')">
                    <h3>paintings</h3>
                    <p>A visual gallery of canvas works, sketches, and fine art collections.</p>
                </div>

                <div class="menu-card" onclick="alert('Other projects coming soon!')">
                    <h3>etc.</h3>
                    <p>Miscellaneous digital creations, design experiments, and logs.</p>
                </div>

            </div>
        </main>
    </div>

    <script>
        function enterWebsite() {
            const intro = document.getElementById('intro-page');
            const main = document.getElementById('main-site');

            intro.classList.add('hidden');
            main.classList.add('visible');
        }
    </script>
</body>
</html>
