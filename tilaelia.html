<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tilaelia's portfolio</title>
    <style>
        /* --- SYSTEM VARIABLE ENGINE & RESETS --- */
        :root {
            --bg-primary: #0b0b0b;
            --bg-secondary: #050505;
            --bg-card: #141414;
            --accent-green: #1db954;
            --text-main: #ffffff;
            --text-muted: #888888;
            --text-dim: #555555;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-mono);
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 1. INTRO SPLASH VIEW --- */
        #intro-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 0.8s ease, visibility 0.8s;
            text-align: center;
            padding: 20px;
        }

        #intro-page h1 {
            font-size: calc(1.8rem + 1.5vw);
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-transform: lowercase;
        }

        #intro-page p {
            font-size: calc(1rem + 0.5vw);
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .enter-btn {
            background: none;
            border: 2px solid var(--text-main);
            color: var(--text-main);
            padding: 12px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            outline: none;
        }

        .enter-btn:hover {
            background-color: var(--text-main);
            color: var(--bg-secondary);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        .enter-btn:active { transform: scale(0.98); }

        #intro-page.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* --- 2. GLOBAL STRUCTURE & ROUTING ANIMATIONS --- */
        #main-site {
            opacity: 0;
            transition: opacity 1s ease 0.5s;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #main-site.visible { opacity: 1; }

        .site-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .site-header h2 {
            font-size: 2rem;
            letter-spacing: 2px;
            cursor: pointer;
            display: inline-block;
        }

        /* Core Application Section Views */
        .portfolio-view {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .portfolio-view.view-active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Back Navigation Array Component */
        .back-nav {
            margin-bottom: 30px;
            cursor: pointer;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            transition: color 0.2s;
            font-size: 0.9rem;
        }
        .back-nav:hover { color: var(--text-main); }

        /* --- 3. VIEW PORTFOLIO MENU (HOME) --- */
        .portfolio-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .menu-card {
            background: var(--bg-card);
            border: 1px solid #222;
            padding: 40px 20px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            border-color: var(--text-dim);
        }

        .menu-card:active { background-color: #1a1a1a; }
        .menu-card h3 { font-size: 1.8rem; margin-bottom: 15px; }
        .menu-card p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.4; }

        /* --- 4. MUSIC WORKSPACE MODULE --- */
        .music-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .crate-container h3 { margin-bottom: 15px; font-size: 1.3rem; color: var(--text-muted); }

        .vinyl-crate-item {
            background: var(--bg-card);
            border: 1px solid #222;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            cursor: pointer;
