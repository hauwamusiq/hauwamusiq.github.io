<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rule 30 Explainer Lab</title>
    <style>
        :root {
            --bg: #0b0f19;
            --surface: #131a2c;
            --border: #222f4d;
            --text: #f3f4f6;
            --text-dim: #9ca3af;
            --blue: #3b82f6;
            --orange: #f59e0b;
            --red: #ef4444;
            --green: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        /* Two Column Screen Split */
        .story-side {
            width: 450px;
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            z-index: 10;
        }

        .canvas-side {
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #070a12;
            position: relative;
            padding: 2rem;
        }

        /* Typography & Story Cards */
        .step-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.2);
            color: var(--blue);
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; color: #fff; letter-spacing: -0.02em; }
        p { color: var(--text-dim); font-size: 1.05rem; line-height: 1.6; margin-bottom: 1.5rem; }
        
        .highlight-box {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--orange);
            padding: 1rem;
            border-radius: 4px;
            font-size: 0.95rem;
            color: #e5e7eb;
        }

        /* Navigation Buttons */
        .button-bar {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            flex-grow: 1;
            background: var(--border);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #2c3b61; }
        button#next-btn { background: var(--blue); }
        button#next-btn:hover { background: #2563eb; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Canvas Elements */
        canvas {
            background-color: #090d16;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
        }

        .legend-hud {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            background: rgba(19, 26, 44, 0.9);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 6px;
            backdrop-filter: blur(8px);
            display: flex;
            gap: 1.5rem;
            font-size: 0.85rem;
        }
        .legend-item { display: flex; align-items: center; gap: 0.5rem; }
        .color-dot { width: 12px; height: 12px; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="story-side">
        <div>
            <div class="step-badge" id="step-label">Step 1 of 5</div>
            <h1 id="step-title">The Lonely Starting Block</h1>
            
            <div id="step-text-container">
                </div>
        </div>

        <div class="button-bar">
            <button id="back-btn" disabled>← Back</button>
            <button id="next-btn">Next Step →</button>
        </div>
    </div>

    <div class="canvas-side">
        <canvas id="explainer-canvas"></canvas>

        <div class="legend-hud">
            <div class="legend-item"><div class="color-dot" style="background: var(--blue)"></div> Active Cell (1)</div>
            <div class="legend-item"><div class="color-dot" style="background: var(--orange)"></div> Center Stripe</div>
            <div class="legend-item"><div class="color-dot" style="background: var(--red)"></div> The Pattern Crash</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('explainer-canvas');
    const ctx = canvas.getContext('2d');

    const label = document.getElementById('step-label');
    const title = document.getElementById('step-title');
    const textContainer = document.getElementById('step-text-container');
    
    const backBtn = document.getElementById('back-btn');
    const nextBtn = document.getElementById('next-btn');

    let currentStep = 0;
    const totalRows = 32;
    const gridWidth = totalRows * 2 + 1;
    const cellSize = 16;

    // Set canvas resolutions explicitly
    canvas.width = gridWidth * cellSize;
    canvas.height = totalRows * cellSize;

    // Pre-calculate standard Rule 30 layout grid matrix
    let matrix = [];
    let initialRow = new Array(gridWidth).fill(0);
    initialRow[totalRows] = 1; // Put the single active cell right in the middle

    for (let r = 0; r < totalRows; r++) {
        matrix.push([...initialRow]);
        let nextRow = new Array(gridWidth).fill(0);
        for (let c = 0; c < initialRow.length; c++) {
            let left = c > 0 ? initialRow[c-1] : 0;
            let center = initialRow[c];
            let right = c < initialRow.length - 1 ? initialRow[c+1] : 0;
            // Native Rule 30 logic gate binary configuration
            nextRow[c] = left ^ (center || right);
        }
        initialRow = nextRow;
    }

    // Storybook step configurations written for absolute clarity
    const steps = [
        {
            title: "The Lonely Block",
            label: "Step 1 of 5",
            text: `
                <p>Imagine a completely blank grid of white paper. We start by coloring just <strong>one single block blue</strong> right in the middle of the very top row.</p>
                <p>Everything else on the sides is completely empty. We call this empty space the "vacuum".</p>
            `
        },
        {
            title: "The Secret Family Rule",
            label: "Step 2 of 5",
            text: `
                <p>To build the next row down, every block looks at its <strong>three neighbors directly above it</strong> (Left, Center, and Right).</p>
                <p>Rule 30 is like a game of telephone: if the blocks above look a certain way, the block below turns blue. If they don't, it stays white.</p>
                <div class="highlight-box">Watch how this simple rule makes rows naturally widen step-by-step!</div>
            `
        },
        {
            title: "The Growing Triangle",
            label: "Step 3 of 5",
            text: `
                <p>As we repeat this row by row, it builds a giant triangle. Notice the <strong>Orange Center Stripe</strong> running straight down the middle.</p>
                <p>Because information can only travel one step left or right per row, the outside walls stay perfectly quiet and white. Nothing can exist outside this triangle.</p>
            `
        },
        {
            title: "The Repeating Loop Trap",
            label: "Step 4 of 5",
            text: `
                <p>Stephen Wolfram wondered: <em>Does that center stripe ever repeat itself like a pattern on a shirt (e.g., Blue, White, Blue, White forever)?</em></p>
                <p>If a pattern repeats over time, it means information has to loop. But because of our rules, to keep a loop going down the center, that pattern is forced to stretch outward to the left.</p>
            `
        },
        {
            title: "The Giant Crash (The Proof)",
            label: "Step 5 of 5",
            text: `
                <p>Here is why it can never repeat: as that pattern tries to stretch further and further left, it eventually <strong>smashes right into the quiet, empty white walls</strong> outside the triangle!</p>
                <p>The empty space has no information to give. It forces the incoming pattern to break. Since it always crashes into the empty wall, a perfect repeating loop is completely impossible!</p>
                <div class="highlight-box" style="border-color: var(--red)">Boom! Contradiction found. The center column can never repeat itself.</div>
            `
        }
    ];

    function drawGrid() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let r = 0; r < totalRows; r++) {
            for (let c = 0; c < gridWidth; c++) {
                let x = c * cellSize;
                let y = r * cellSize;
                
                // Determine layout visibility constraints depending on current active step
                let shouldDrawCell = false;
                let cellColor = "#111827"; // Blank grid color

                if (currentStep === 0) {
                    if (r === 0) shouldDrawCell = true;
                } else if (currentStep === 1) {
                    if (r < 6) shouldDrawCell = true;
                } else {
                    shouldDrawCell = true; // Show the full matrix field
                }

                if (shouldDrawCell) {
                    if (matrix[r][c] === 1) {
                        cellColor = varColor('--blue');
                        // Turn center line orange on steps 3, 4, 5
                        if (c === totalRows && currentStep >= 2) {
                            cellColor = varColor('--orange');
                        }
                    }
                }

                // Step 5: Highlight the visual wall collision intersection point
                if (currentStep === 4 && r === 12 && c === totalRows - 12) {
                    cellColor = varColor('--red');
                }

                ctx.fillStyle = cellColor;
                ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);

                // Add grid wirelines for unrendered sections
                if (!shouldDrawCell) {
                    ctx.strokeStyle = "rgba(255,255,255,0.02)";
                    ctx.strokeRect(x, y, cellSize, cellSize);
                }
            }
        }

        // Add custom graphical overlay callouts matching selected steps
        if (currentStep === 0) {
            drawArrow(totalRows * cellSize + (cellSize/2), 40, totalRows * cellSize + (cellSize/2), 12, varColor('--blue'));
        }
        if (currentStep === 4) {
            // Draw tracking arrow showing history shifting into the blank vacuum edge
            let arrowStartX = totalRows * cellSize;
            let arrowStartY = 24 * cellSize;
            let arrowEndX = (totalRows - 12) * cellSize;
            let arrowEndY = 12 * cellSize;
            drawArrow(arrowStartX, arrowStartY, arrowEndX, arrowEndY, varColor('--red'));
        }
    }

    // Helper functions for graphics clean rendering paths
    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function drawArrow(fromx, fromy, tox, toy, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(fromx, fromy);
        ctx.lineTo(tox, toy);
        ctx.stroke();
        
        // Small arrow head coordinates
        let angle = Math.atan2(toy - fromy, tox - fromx);
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(tox, toy);
        ctx.lineTo(tox - 10 * Math.cos(angle - Math.PI/6), toy - 10 * Math.sin(angle - Math.PI/6));
        ctx.lineTo(tox - 10 * Math.cos(angle + Math.PI/6), toy - 10 * Math.sin(angle + Math.PI/6));
        ctx.fill();
    }

    function updateStepUI() {
        const stepData = steps[currentStep];
        label.innerText = stepData.label;
        title.innerText = stepData.title;
        textContainer.innerHTML = stepData.text;

        backBtn.disabled = currentStep === 0;
        nextBtn.disabled = currentStep === steps.length - 1;

        drawGrid();
    }

    // Hook Up User Control Interactions
    nextBtn.addEventListener('click', () => {
        if (currentStep < steps.length - 1) {
            currentStep++;
            updateStepUI();
        }
    });

    backBtn.addEventListener('click', () => {
        if (currentStep > 0) {
            currentStep--;
            updateStepUI();
        }
    });

    // Boot system immediately
    updateStepUI();
</script>
</body>
</html>
