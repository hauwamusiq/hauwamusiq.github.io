<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>HAUWAMUSIQ :: SYSTEM 10x ANIME CREATOR OS</title>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.x/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js"></script>

<style>
:root {
  --bg-dark: #050508;
  --panel-bg: rgba(13, 13, 23, 0.94);
  --accent: #ffd54a;
  --btn-bg: #22223b;
  --btn-hover: #3e3e66;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  margin: 0; padding: 0; overflow: hidden;
  background: var(--bg-dark); color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  height: 100%; width: 100%; position: fixed;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

#app { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }
#stage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

#subtitle {
  position: absolute; bottom: 38%; width: 100%; text-align: center;
  font-size: 28px; font-weight: 900; text-shadow: 0 0 12px rgba(0,0,0,1), 0 2px 4px rgba(0,0,0,1);
  pointer-events: none; padding: 0 24px; z-index: 2; font-style: italic; letter-spacing: 0.5px;
}

.word { color: #fff; transition: color 0.05s ease; display: inline-block; margin-right: 8px; }
.word.active { color: var(--accent); transform: scale(1.05); }

#telemetry {
  position: absolute; top: 16px; left: 16px; right: 16px;
  background: rgba(0, 0, 0, 0.75); padding: 14px; border-radius: 14px;
  font-size: 11px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.12); z-index: 2; pointer-events: none;
  font-family: monospace; line-height: 1.4;
}

#ui-toggle {
  position: absolute; bottom: calc(16px + var(--safe-bottom)); right: 16px; z-index: 10;
  background: var(--accent); color: #000; border: none; padding: 14px 28px;
  border-radius: 30px; font-weight: 900; box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  font-size: 13px; letter-spacing: 0.5px;
}

#ui-panel {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 65vh;
  background: var(--panel-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
  border-top: 1px solid rgba(255,255,255,0.18); border-radius: 28px 28px 0 0;
  z-index: 5; display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  padding-bottom: var(--safe-bottom);
}
#ui-panel.open { transform: translateY(0); }

.drag-handle { width: 50px; height: 5px; background: rgba(255,255,255,0.25); border-radius: 3px; margin: 12px auto; cursor: pointer; }
#panel-content { flex: 1; overflow-y: auto; padding: 0 18px 18px 18px; }

#controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }

button, .file-label, select {
  background: var(--btn-bg); color: white; border: none; padding: 14px;
  border-radius: 14px; font-weight: bold; font-size: 13px; text-align: center; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
  font-family: inherit;
}
button:active, .file-label:active, select:active { background: var(--btn-hover); }
.file-label input { display: none; }
select { appearance: none; -webkit-appearance: none; text-align-last: center; }

#music-status { grid-column: span 2; font-size: 11px; text-align: center; color: #8a8ab0; margin-top: -4px; font-family: monospace; }

textarea {
  width: 100%; height: 110px; background: rgba(0,0,0,0.5); color: white;
  border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 14px;
  resize: none; font-size: 13px; margin-bottom: 14px; font-family: monospace; line-height: 1.5;
}

#wave { height: 55px; background: rgba(0,0,0,0.35); border-radius: 14px; margin-bottom: 14px; overflow: hidden; }
#queue { display: flex; flex-direction: column; gap: 12px; }

.card { 
  background: rgba(255,255,255,0.04); padding: 16px; border-radius: 18px; 
  border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
.meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.name { font-weight: 900; color: var(--accent); font-size: 14px; letter-spacing: 0.5px; }
.mood-tag { font-size: 11px; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 20px; color: #ccc; text-transform: uppercase; }
.text { font-size: 13px; opacity: 0.95; margin-bottom: 14px; line-height: 1.45; }
.card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-recording { background: #ff3b30 !important; animation: recPulse 1s infinite alternate; }

@keyframes recPulse { from { opacity: 1; } to { opacity: 0.5; } }
</style>
</head>
<body>

<div id="app">
  <div id="stage"></div>
  <div id="subtitle"></div>
  
  <div id="telemetry">SYSTEM OS // Initialization success. Parse script to map nodes.</div>

  <button id="ui-toggle" onclick="togglePanel()">⚙️ CREATOR UI</button>

  <div id="ui-panel">
    <div class="drag-handle" onclick="togglePanel()"></div>
    <div id="panel-content">
      <div id="controls">
        <button id="parse">🔄 PARSE ANIME SCRIPT</button>
        <button id="play">🎬 RUN CINEMATICS</button>
        <select id="bg-selector" onchange="changeBackground(this.value)">
          <option value="cyberpunk">🌆 SCENE: CYBERPUNK CITY</option>
          <option value="dojo">🏮 SCENE: ANCIENT DOJO</option>
          <option value="space">🚀 SCENE: DEEP SPACE</option>
          <option value="forest">🌲 SCENE: FANTASY FOREST</option>
        </select>
        <label class="file-label">
          🎵 SOUNDTRACK
          <input type="file" id="music" accept="audio/*">
        </label>
        <div id="music-status">No backing audio stream configured</div>
      </div>

      <textarea id="script">
BACKGROUND: cyberpunk
ARI [expression=shocked]: Look! The microwave dimension has breached the sky!
GHOST [expression=normal]: Relax. Your cooking has just warped space-time.
ARI [expression=normal]: Honestly... that makes complete sense.
BACKGROUND: space
GHOST [expression=shocked]: Wait, where did the ground go?!
      </textarea>

      <div id="wave"></div>
      <div id="queue"></div>
    </div>
  </div>
</div>

<script>
let lines = [];
let bgMusic = null;
let activeRecorder = null;
let recordingStream = null;

function togglePanel() {
  const panel = document.getElementById('ui-panel');
  const toggleBtn = document.getElementById('ui-toggle');
  panel.classList.toggle('open');
  toggleBtn.textContent = panel.classList.contains('open') ? '❌ CLOSE CANVAS' : '⚙️ CREATOR UI';
}

////////////////////////////////////////////////////////////
// PIXI HIGH-PERFORMANCE 2D ANIME ENGINE
////////////////////////////////////////////////////////////
const stageDiv = document.getElementById("stage");
const app = new PIXI.Application({
  resizeTo: stageDiv, antialias: true,
  resolution: window.devicePixelRatio || 1, autoDensity: true
});
stageDiv.appendChild(app.view);

// Multi-tier Parallax Layer Architecture Mapping
const skyLayer = new PIXI.Container();
const midgroundLayer = new PIXI.Container();
const actorLayer = new PIXI.Container();
app.stage.addChild(skyLayer, midgroundLayer, actorLayer);

const skyGfx = new PIXI.Graphics();
const midGfx = new PIXI.Graphics();
skyLayer.addChild(skyGfx);
midgroundLayer.addChild(midGfx);

// Env Palette Configurations
const environments = {
  cyberpunk: { sky: 0x070714, ambient: 0xff00aa, stars: 0x39ff14, mid: 0x141428, drawMid: (g)=> {
    g.clear().beginFill(0x111122);
    for(let i=0; i<15; i++) g.drawRect(i*120, window.innerHeight - 350 - (i%3)*40, 90, 400);
    g.endFill();
  }},
  dojo: { sky: 0x2b1108, ambient: 0xffaa44, stars: 0xffddaa, mid: 0x4a2211, drawMid: (g)=> {
    g.clear().beginFill(0x3a1a0e).drawRect(0, window.innerHeight-180, 5000, 200).endFill();
    g.beginFill(0x1a0a05); for(let i=0;i<8;i++) g.drawRect(i*250 + 40, window.innerHeight-380, 20, 200); g.endFill();
  }},
  space: { sky: 0x020205, ambient: 0x00ffff, stars: 0xffffff, mid: 0x0a0d1a, drawMid: (g)=> {
    g.clear().beginFill(0x0a0a15, 0.5).drawCircle(window.innerWidth*0.5, window.innerHeight+400, 600).endFill();
  }},
  forest: { sky: 0x051a10, ambient: 0x44ffaa, stars: 0xaaffdd, mid: 0x0c2e1b, drawMid: (g)=> {
    g.clear().beginFill(0x082214);
    for(let i=0; i<20; i++) g.drawCircle(i*100, window.innerHeight-100 - (i%2)*30, 80);
    g.endFill();
  }}
};

function changeBackground(type) {
  const env = environments[type] || environments.cyberpunk;
  
  // Repaint sky layer canvas
  skyGfx.clear().beginFill(env.sky).drawRect(0, 0, 5000, 5000).endFill();
  
  // Clear and reconstruct background particle elements
  while(skyLayer.children.length > 1) skyLayer.removeChildAt(1);
  for(let i=0; i<70; i++){
    const s = new PIXI.Graphics().beginFill(env.stars, Math.random()).drawCircle(0, 0, Math.random() * 2 + 0.5).endFill();
    s.x = Math.random() * window.innerWidth; s.y = Math.random() * window.innerHeight;
    skyLayer.addChild(s);
  }
  
  env.drawMid(midGfx);
  document.getElementById("bg-selector").value = type;
}

////////////////////////////////////////////////////////////
// ADVANCED VECTOR ANIME SPRITE RIGGING
////////////////////////////////////////////////////////////

  const leftEye = new PIXI.Graphics();
  const rightEye = new PIXI.Graphics();
  const mouth = new PIXI.Graphics();
  
  faceContainer.addChild(head, leftEye, rightEye, mouth);
  container.addChild(body, faceContainer);
  
  container.mouth = mouth;
  container.leftEye = leftEye;
  container.rightEye = rightEye;
  container.face = faceContainer;

  container.setExpression = (mood) => {

      rightEye.beginFill(0x000000).drawCircle(9, -96, 6).beginFill(0xffffff).drawCircle(9, -96, 2).endFill();
      mouth.beginFill(0x000000).drawCircle(0, -74, 9).endFill();
    } else { // Standard/Normal layout
      leftEye.beginFill(0x000000).drawCircle(-9, -96, 4).beginFill(0xffffff).drawCircle(-10, -98, 1.5).endFill();
      rightEye.beginFill(0x000000).drawCircle(9, -96, 4).beginFill(0xffffff).drawCircle(8, -98, 1.5).endFill();
      mouth.beginFill(0x000000).drawRoundedRect(-10,
