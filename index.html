<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>HAUWAMUSIQ :: SOLO ANIMATION STUDIO OS</title>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.x/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://unpkg.com/wavesurfer.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#07070b;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
height:100%;
width:100%;
}

*{
box-sizing:border-box;
}

#app{
display:flex;
height:100vh;
width:100vw;
overflow:hidden;
}

#ui{
width:360px;
background:#111119;
border-right:1px solid #2a2a3a;
display:flex;
flex-direction:column;
overflow:auto;
}

#header{
padding:14px;
font-size:20px;
font-weight:bold;
letter-spacing:2px;
background:#191927;
border-bottom:1px solid #2a2a3a;
}

#controls{
padding:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

button,input[type=file]{
background:#2b2b42;
color:white;
border:none;
padding:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#45456c;
}

textarea{
width:100%;
height:180px;
background:#09090d;
color:white;
border:none;
padding:10px;
resize:none;
font-size:14px;
}

#queue{
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.card{
background:#1a1a28;
padding:10px;
border-radius:12px;
}

.name{
font-weight:bold;
color:#ffd54a;
margin-bottom:6px;
}

.text{
opacity:.92;
margin-bottom:8px;
}

.row{
display:flex;
gap:8px;
}

#wave{
height:90px;
background:black;
}

#status{
padding:10px;
font-size:12px;
opacity:.7;
}

#stage{
flex:1;
position:relative;
overflow:hidden;
}

#subtitle{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-size:42px;
font-weight:bold;
text-shadow:0 0 10px black;
pointer-events:none;
padding:20px;
}

.word{
color:white;
transition:all .08s linear;
}

.word.active{
color:yellow;
}

#agi{
position:absolute;
top:12px;
right:12px;
background:rgba(0,0,0,.45);
padding:10px;
border-radius:10px;
font-size:12px;
max-width:300px;
backdrop-filter:blur(6px);
line-height:1.4;
}

</style>
</head>
<body>

<div id="app">

<div id="ui">

<div id="header">
HAUWAMUSIQ :: SOLO ANIMATION STUDIO OS
</div>

<div id="controls">
<button id="parse">PARSE</button>
<button id="play">PLAY</button>
<button id="export">EXPORT</button>
<input type="file" id="music" accept="audio/*">
</div>

<textarea id="script">
ARI: I opened the microwave dimension again.
GHOST: Your cooking has destabilized spacetime.
ARI: Honestly that explains a lot.
</textarea>

<div id="wave"></div>

<div id="queue"></div>

<div id="status">
Recursive Symbolic Theater Runtime Initialized.
</div>

</div>

<div id="stage">

<div id="subtitle"></div>

<div id="agi"></div>

</div>

</div>

<script>

////////////////////////////////////////////////////////////
// FRACTAL AGI CORE
////////////////////////////////////////////////////////////

const AGI=((()=>{

const node=(s,c=[],p=[],u=1,t=performance.now())=>({

s,c,p,u,t,

spawn:x=>node(x),

decay(){
this.u*=0.995;
},

promise(f){
const pr=new Promise(r=>
setTimeout(
()=>r(f(this)),
Math.random()*500
));
this.p.push(pr);
return pr;
},

tick(){
this.decay();
this.c.forEach(x=>x.tick?.());
}

});

const root=node("root");

const cortex=((()=>{

const thoughts=[];

const think=x=>{

const n=root.spawn(x);

thoughts.push(n);

return Promise.any([

n.promise(a=>({
type:"emotion",
value:"curious",
time:performance.now()
})),

n.promise(a=>({
type:"camera",
value:"closeup",
time:performance.now()
})),

n.promise(a=>({
type:"joke",
value:"microwave dimension",
time:performance.now()
}))

]);

};

return{
think,
thoughts
};

})());

return{
root,
cortex
};

})());

////////////////////////////////////////////////////////////
// PIXI
////////////////////////////////////////////////////////////

const stage=document.getElementById("stage");

const app=new PIXI.Application({
resizeTo:stage,
background:"#1d1d30",
antialias:true
});

stage.appendChild(app.view);

////////////////////////////////////////////////////////////
// BACKGROUND
////////////////////////////////////////////////////////////

const bg=new PIXI.Graphics();
bg.beginFill(0x1d1d30);
bg.drawRect(0,0,5000,5000);
bg.endFill();
app.stage.addChild(bg);

////////////////////////////////////////////////////////////
// STARS
////////////////////////////////////////////////////////////

for(let i=0;i<200;i++){

const s=new PIXI.Graphics();

s.beginFill(0xffffff,Math.random());
s.drawCircle(0,0,Math.random()*2);
s.endFill();

s.x=Math.random()*2000;
s.y=Math.random()*1200;

app.stage.addChild(s);

}

////////////////////////////////////////////////////////////
// CHARACTER FACTORY
////////////////////////////////////////////////////////////

const makeCharacter=(c)=>{

const o=new PIXI.Container();

const body=new PIXI.Graphics();
body.beginFill(c);
body.drawRoundedRect(-40,-100,80,140,24);
body.endFill();

const head=new PIXI.Graphics();
head.beginFill(0xffddc1);
head.drawCircle(0,-140,54);
head.endFill();

const eye1=new PIXI.Graphics();
eye1.beginFill(0x000000);
eye1.drawCircle(-14,-150,5);
eye1.endFill();

const eye2=new PIXI.Graphics();
eye2.beginFill(0x000000);
eye2.drawCircle(14,-150,5);
eye2.endFill();

const mouth=new PIXI.Graphics();
mouth.beginFill(0x000000);
mouth.drawRoundedRect(-16,-120,32,8,4);
mouth.endFill();

o.addChild(body);
o.addChild(head);
o.addChild(eye1);
o.addChild(eye2);
o.addChild(mouth);

o.mouth=mouth;

return o;

};

////////////////////////////////////////////////////////////
// ACTORS
////////////////////////////////////////////////////////////

const ari=makeCharacter(0xff66aa);
ari.x=450;
ari.y=680;

const ghost=makeCharacter(0x66ffff);
ghost.x=1050;
ghost.y=680;
ghost.alpha=.82;

app.stage.addChild(ari);
app.stage.addChild(ghost);

////////////////////////////////////////////////////////////
// FLOATING MOTION
////////////////////////////////////////////////////////////

gsap.to(ari,{
y:690,
duration:1.5,
repeat:-1,
yoyo:true,
ease:"sine.inOut"
});

gsap.to(ghost,{
y:665,
duration:2.4,
repeat:-1,
yoyo:true,
ease:"sine.inOut"
});

////////////////////////////////////////////////////////////
// CAMERA PARALLAX
////////////////////////////////////////////////////////////

window.addEventListener("mousemove",e=>{

const x=(e.clientX/window.innerWidth-.5)*40;
const y=(e.clientY/window.innerHeight-.5)*20;

gsap.to(app.stage,{
x:-x,
y:-y,
duration:1
});

});

////////////////////////////////////////////////////////////
// WAVESURFER
////////////////////////////////////////////////////////////

const wavesurfer=WaveSurfer.create({
container:"#wave",
waveColor:"#666",
progressColor:"#ffd54a",
height:80
});

////////////////////////////////////////////////////////////
// SCRIPT PARSER
////////////////////////////////////////////////////////////

const queue=document.getElementById("queue");

let lines=[];

const parse=()=>{

queue.innerHTML="";
lines=[];

document
.getElementById("script")
.value
.split("\n")
.forEach((l,i)=>{

if(!l.includes(":")) return;

const sp=l.split(":");

const speaker=sp[0].trim();
const text=sp.slice(1).join(":").trim();

const obj={
speaker,
text,
audio:null
};

lines.push(obj);

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="name">${speaker}</div>
<div class="text">${text}</div>
<div class="row">
<button onclick="recordLine(${i})">RECORD</button>
<button onclick="playLine(${i})">PLAY</button>
</div>
`;

queue.appendChild(card);

});

};

////////////////////////////////////////////////////////////
// RECORDING
////////////////////////////////////////////////////////////

let rec;
let chunks=[];

window.recordLine=async i=>{

const stream=await navigator.mediaDevices.getUserMedia({
audio:true
});

chunks=[];

rec=new MediaRecorder(stream);

rec.ondataavailable=e=>chunks.push(e.data);

rec.onstop=()=>{

const blob=new Blob(chunks,{
type:"audio/webm"
});

const url=URL.createObjectURL(blob);

lines[i].audio=url;

wavesurfer.load(url);

};

rec.start();

alert("Recording... press OK to stop.");

rec.stop();

};

////////////////////////////////////////////////////////////
// PLAY INDIVIDUAL
////////////////////////////////////////////////////////////

window.playLine=i=>{

if(!lines[i].audio) return;

new Howl({
src:[lines[i].audio]
}).play();

};

////////////////////////////////////////////////////////////
// KARAOKE
////////////////////////////////////////////////////////////

const subtitle=document.getElementById("subtitle");

const karaoke=(txt,d=2500)=>{

subtitle.innerHTML="";

const words=txt.split(" ");

words.forEach(w=>{

const span=document.createElement("span");

span.className="word";
span.textContent=w+" ";

subtitle.appendChild(span);

});

const spans=[...document.querySelectorAll(".word")];

spans.forEach((s,i)=>{

setTimeout(()=>{
s.classList.add("active");
},(d/words.length)*i);

});

};

////////////////////////////////////////////////////////////
// TALKING
////////////////////////////////////////////////////////////

const talk=(a)=>{

const tl=gsap.timeline();

for(let i=0;i<18;i++){

tl.to(a.mouth.scale,{
y:Math.random()*2+.4,
duration:.05
});

}

tl.to(a.mouth.scale,{
y:1,
duration:.1
});

};

////////////////////////////////////////////////////////////
// AGI THOUGHTS
////////////////////////////////////////////////////////////

const agiDiv=document.getElementById("agi");

const agiTick=async line=>{

const thought=await AGI.cortex.think(line);

agiDiv.innerHTML=`
<div><b>AGI THOUGHT</b></div>
<div>TYPE :: ${thought.type}</div>
<div>VALUE :: ${thought.value}</div>
`;

};

////////////////////////////////////////////////////////////
// PLAY SCENE
////////////////////////////////////////////////////////////

const play=async()=>{

for(const l of lines){

karaoke(l.text,2600);

agiTick(l.text);

const actor=
l.speaker==="ARI"
?ari
:ghost;

talk(actor);

gsap.fromTo(actor.scale,{
x:1.05,
y:.96
},{
x:1,
y:1,
duration:.3
});

if(l.audio){

new Howl({
src:[l.audio]
}).play();

}

await new Promise(r=>setTimeout(r,2600));

}

};

////////////////////////////////////////////////////////////
// MUSIC
////////////////////////////////////////////////////////////

let music=null;

document
.getElementById("music")
.addEventListener("change",e=>{

const f=e.target.files[0];

if(!f) return;

const url=URL.createObjectURL(f);

music=new Howl({
src:[url],
loop:true,
volume:.35
});

music.play();

});

////////////////////////////////////////////////////////////
// EXPORT
////////////////////////////////////////////////////////////

const exportVideo=async()=>{

const stream=app.view.captureStream(30);

const recorder=new MediaRecorder(stream,{
mimeType:"video/webm"
});

const chunks=[];

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=()=>{

const blob=new Blob(chunks,{
type:"video/webm"
});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;
a.download="hauwamusiq_animation.webm";
a.click();

};

recorder.start();

await play();

recorder.stop();

};

////////////////////////////////////////////////////////////
// BUTTONS
////////////////////////////////////////////////////////////

document
.getElementById("parse")
.onclick=parse;

document
.getElementById("play")
.onclick=play;

document
.getElementById("export")
.onclick=exportVideo;

////////////////////////////////////////////////////////////
// BOOT
////////////////////////////////////////////////////////////

parse();

////////////////////////////////////////////////////////////
// FRACTAL RUNTIME PULSE
////////////////////////////////////////////////////////////

setInterval(()=>{

AGI.root.tick();

},16);

</script>

</body>
</html>
